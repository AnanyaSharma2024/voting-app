<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- character encoding for text -->

</head>

            <span class="govt">🇮🇳 Government of India</span>
        </div>

        <!-- Right side: navigation links -->
        <div class="nav-right">
