<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- character encoding -->
    <title>Vote Page</title> <!-- page title shown in browser tab -->

    <!-- link to external CSS file -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== Navigation Bar ===== -->
    <nav class="navbar">

        <!-- Left side (Government label) -->
        <div class="nav-left">
            <span class="govt">🇮🇳 Government of India</span>
        </div>
        
        <!-- Right side navigation links -->
        <div class="nav-right">
            <a href="index.html">Home</a> <!-- go to home page -->
            <a href="admin.html" class="admin-only">Admin</a> <!-- admin page (restricted) -->
            <a href="result.html">Results</a> <!-- results page -->
            
            <!-- logout button triggers logout function -->
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Page heading -->
    <h1>Cast Your Vote</h1>

    <!-- Additional logout button -->
    <button onclick="logout()" class="logout-btn">Logout</button>

    <!-- ===== Candidate Section ===== -->

    <!-- container where candidate cards will be added dynamically using JS -->
    <div id="candidateList" class="candidate-container">
        <!-- Candidates will be loaded here dynamically -->
    </div>

    <!-- ===== JavaScript Files ===== -->

    <!-- API related functions (like fetch data from backend) -->
    <script src="js/api.js"></script>

    <!-- Voting logic (handle vote actions, UI updates) -->
    <script src="js/vote.js"></script>

</body>
</html>
